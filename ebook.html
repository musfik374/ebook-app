<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ebook App</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turn.js@4/turn.min.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

header{
width:100%;
padding:15px;
display:flex;
justify-content:space-between;
background:#020617;
}

button{
padding:8px 14px;
border-radius:8px;
border:none;
cursor:pointer;
}

#book{
width:90%;
max-width:800px;
height:600px;
margin-top:20px;
}

.page{
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.dark{
background:#0f172a;
color:white;
}

.controls{
margin:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

</style>
</head>
<body>

<header>
<div>📚 My Ebook</div>
<button onclick="toggleMode()">🌙 Mode</button>
</header>

<input type="file" id="upload" accept="application/pdf">

<div id="book"></div>

<div class="controls">
<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>
<button onclick="bookmark()">🔖 Bookmark</button>
<button onclick="goBookmark()">⭐ Buka Bookmark</button>
</div>

<script>

let pdfDoc=null
let currentPage=1

const book=document.getElementById("book")

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(){

let typedarray=new Uint8Array(this.result)

pdfjsLib.getDocument(typedarray).promise.then(pdf=>{

pdfDoc=pdf
loadPages()

})

}

reader.readAsArrayBuffer(file)

})

function loadPages(){

book.innerHTML=""

for(let i=1;i<=pdfDoc.numPages;i++){

let div=document.createElement("div")
div.className="page"
div.id="page-"+i
div.innerHTML="Loading "+i

book.appendChild(div)

renderPage(i)

}

$("#book").turn({
width:800,
height:600,
autoCenter:true
})

let saved=localStorage.getItem("lastPage")

if(saved){
$("#book").turn("page",saved)
}

}

function renderPage(num){

pdfDoc.getPage(num).then(page=>{

let viewport=page.getViewport({scale:1})

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.height=viewport.height
canvas.width=viewport.width

let div=document.getElementById("page-"+num)
div.innerHTML=""
div.appendChild(canvas)

page.render({
canvasContext:ctx,
viewport:viewport
})

})

}

function nextPage(){
$("#book").turn("next")
saveProgress()
}

function prevPage(){
$("#book").turn("previous")
saveProgress()
}

function saveProgress(){
let page=$("#book").turn("page")
localStorage.setItem("lastPage",page)
}

function bookmark(){

let page=$("#book").turn("page")
localStorage.setItem("bookmark",page)
alert("Bookmark disimpan halaman "+page)

}

function goBookmark(){

let page=localStorage.getItem("bookmark")

if(page){
$("#book").turn("page",page)
}

}

function toggleMode(){

document.body.classList.toggle("dark")

}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>

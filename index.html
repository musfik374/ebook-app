<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF E-Book Reader</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
    h6{
        opacity:0.3;
        color:white;
        justify-content: right;
        text-align:right;
    }

.goto{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

.goto input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

body{
font-family: system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
font-weight:600;
margin-bottom:10px;
    
}

.reader{
background:#020617;
padding:20px;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,.4);
max-width:900px;
width:100%;
}

canvas{
width:100%;
border-radius:10px;
background:white;
}

.controls{
display:flex;
justify-content:space-between;
margin-top:10px;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

input{
margin-bottom:15px;
}

.pageinfo{
text-align:center;
margin-top:10px;
opacity:.8;
}

</style>
</head>
<body>

<h1>📚 PDF E-Book Reader</h1>

<div class="reader">

<input type="file" id="upload" accept="application/pdf">
<div class="goto">
<input type="number" id="goto-page" placeholder="Masukan halaman yang akan dibaca..."min="1">
<button id="go">Go</button>
</div>

<canvas id="pdf-render"></canvas>

<div class="controls">
<button id="prev">Prev</button>
<button id="next">Next</button>
</div>

<div class="pageinfo">
Halaman <span id="page-num"></span> / <span id="page-count"></span>
<br><h6>created by:msfx</h6>
</div>

</div>


<script>
    document.getElementById('go').addEventListener('click', goToPage)

document.getElementById('goto-page').addEventListener('keypress', function(e){
if(e.key === 'Enter'){
goToPage()
}
})

function goToPage(){

let pageInput = parseInt(document.getElementById('goto-page').value)

if(!pdfDoc) return

if(pageInput >= 1 && pageInput <= pdfDoc.numPages){
pageNum = pageInput
renderPage(pageNum)
}

}

let pdfDoc = null
let pageNum = 1
let canvas = document.getElementById('pdf-render')
let ctx = canvas.getContext('2d')

document.getElementById('upload').addEventListener('change', function(e){

let file = e.target.files[0]
let reader = new FileReader()

reader.onload = function(){
let typedarray = new Uint8Array(this.result)

pdfjsLib.getDocument(typedarray).promise.then(pdf => {
pdfDoc = pdf
document.getElementById('page-count').textContent = pdf.numPages
renderPage(pageNum)
})
}

reader.readAsArrayBuffer(file)

})

function renderPage(num){

pdfDoc.getPage(num).then(page => {

let viewport = page.getViewport({scale:1.5})
canvas.height = viewport.height
canvas.width = viewport.width

let renderContext = {
canvasContext: ctx,
viewport: viewport
}

page.render(renderContext)

document.getElementById('page-num').textContent = num

})

}

document.getElementById('next').addEventListener('click', () => {
if(pageNum >= pdfDoc.numPages) return
pageNum++
renderPage(pageNum)
})

document.getElementById('prev').addEventListener('click', () => {
if(pageNum <= 1) return
pageNum--
renderPage(pageNum)
})
    let startX = 0

canvas.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX
})

canvas.addEventListener("touchend", e=>{
let endX = e.changedTouches[0].clientX

if(endX < startX){
nextPage()
}

if(endX > startX){
prevPage()
}
})
    localStorage.setItem("page", pageNum)

</script>

</body>
</html>
